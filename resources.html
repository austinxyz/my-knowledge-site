<script>
  var ARTICLES = [
    { topic: '401K', title: '401K 没配满，你每年在白送公司福利', summary: '很多工程师只配到公司 match 线就停了，其实还有 after-tax + Mega Backdoor 的巨大空间。这篇讲清额度怎么算。', date: '2026-06-18', readTime: '8 分钟' },
    { topic: 'RSU', title: 'RSU vest 当天，你其实已经交过一次税了', summary: 'Vest 即视同收入，预扣的 22% 往往不够。搞懂补税缺口，才能决定该留还是该卖。', date: '2026-06-02', readTime: '10 分钟' },
    { topic: '税务规划', title: 'ISO 行权前，先算清楚你的 AMT 触发线', summary: '增量行权、跨年拆分、提前预演——AMT 不是黑盒，是可以精算的。附一个简化测算框架。', date: '2026-05-20', readTime: '12 分钟' },
    { topic: '投资基础', title: '集中持仓：工程师最容易忽视的单点风险', summary: '雇主股票占净资产一半以上时，你押注的不只是市场，还是一家公司。如何有节奏地分散。', date: '2026-05-06', readTime: '7 分钟' },
    { topic: '税务规划', title: 'Backdoor Roth 的每一步，别踩 Pro-Rata 坑', summary: '一个被 Traditional IRA 余额毁掉的 Backdoor 操作，可能让你多交税还留下麻烦。正确顺序在这。', date: '2026-04-22', readTime: '9 分钟' },
    { topic: '401K', title: 'HSA：被低估的第三重免税账户', summary: '存入免税、增值免税、医疗支出取出也免税。对高收入工程师，它其实是隐藏的退休账户。', date: '2026-04-08', readTime: '6 分钟' },
    { topic: 'RSU', title: '换工作时，别让手里的 RSU 和 ISO 悄悄归零', summary: '离职窗口、未 vest 份额、ISO 90 天行权期——跳槽 offer 谈判时最该核对的股权清单。', date: '2026-03-25', readTime: '8 分钟' },
    { topic: '投资基础', title: '先建应急金，还是先 max 401K？', summary: '现金流、税优额度、机会成本三者怎么排序？给不同 vest 节奏的工程师一个决策顺序。', date: '2026-03-11', readTime: '7 分钟' }
  ];
  var CATS = ['全部', '401K', 'RSU', '税务规划', '投资基础'];
  var active = '全部';

  function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function cardHTML(a){
    return '<a href="#" class="card" style="display:flex;flex-direction:column;background:#fff;border:1px solid rgba(15,24,29,.1);border-radius:16px;padding:26px 26px 28px">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">'
      + '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;letter-spacing:.5px;color:#0f3b66;background:#eef3f8;border:1px solid rgba(15,59,102,.14);padding:5px 11px;border-radius:100px">' + esc(a.topic) + '</span>'
      + '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:#9aa4ae">' + esc(a.readTime) + '</span>'
      + '</div>'
      + '<h3 style="font-family:\'Noto Serif SC\',serif;font-weight:600;font-size:20px;line-height:1.45;margin:0 0 12px;text-wrap:pretty">' + esc(a.title) + '</h3>'
      + '<p style="font-size:14.5px;line-height:1.8;color:#5b6672;margin:0 0 22px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' + esc(a.summary) + '</p>'
      + '<div style="margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:18px;border-top:1px solid rgba(15,24,29,.07)">'
      + '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:12.5px;color:#9aa4ae">' + esc(a.date) + '</span>'
      + '<span style="font-size:13.5px;font-weight:500;color:#0f3b66">阅读 →</span>'
      + '</div></a>';
  }

  function renderGrid(){
    var list = active === '全部' ? ARTICLES : ARTICLES.filter(function(a){ return a.topic === active; });
    document.getElementById('grid').innerHTML = list.map(cardHTML).join('');
  }

  function renderFilters(){
    var wrap = document.getElementById('filters');
    wrap.innerHTML = '';
    CATS.forEach(function(label){
      var b = document.createElement('button');
      b.className = 'chip' + (label === active ? ' active' : '');
      b.textContent = label;
      b.addEventListener('click', function(){
        active = label;
        renderFilters();
        renderGrid();
      });
      wrap.appendChild(b);
    });
  }

  renderFilters();
  renderGrid();
</script>
