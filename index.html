<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>理财顾问落地页 · 硅谷华人理财顾问</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0}
  body{
    background:#faf7f2;
    font-family:'Instrument Sans','Noto Sans SC',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    color:#17201c;
  }
  a{color:inherit}
  .wrap{max-width:1180px;margin:0 auto}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:24px 60px}
  .brand{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .nav-right{display:flex;align-items:center;gap:18px}
  .nav-links{display:flex;align-items:center;gap:22px}
  .nav-link{text-decoration:none;font-size:14px;font-weight:600;color:#1a4d3a}
  .nav-link.active{position:relative}
  .nav-link.active::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;border-radius:2px;background:#1a4d3a}
  .toggle{cursor:pointer;font-size:13px;font-weight:500;color:#5b6b63;padding:7px 14px;background:#fff;border:none;border-radius:999px;box-shadow:0 1px 4px rgba(23,32,28,.08);font-family:inherit}
  .btn-primary{text-decoration:none;font-size:14px;font-weight:600;color:#fff;background:#1a4d3a;padding:11px 22px;border-radius:999px}

  .hero{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center;padding:48px 60px 64px}
  .kicker{display:inline-block;font-size:13px;font-weight:600;color:#1a4d3a;background:#e9f1ec;padding:7px 15px;border-radius:999px;margin-bottom:24px}
  .hero h1{font-size:56px;line-height:1.14;font-weight:600;letter-spacing:-.025em;margin:0 0 22px;white-space:nowrap}
  .hero p{font-size:18px;line-height:1.75;color:#5b6b63;margin:0 0 32px;max-width:30em}
  .hero-cta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .btn-lg-primary{text-decoration:none;font-size:15px;font-weight:600;color:#fff;background:#1a4d3a;padding:15px 28px;border-radius:999px}
  .btn-lg-ghost{text-decoration:none;font-size:15px;font-weight:600;color:#1a4d3a;background:#fff;padding:15px 28px;border-radius:999px;box-shadow:0 1px 5px rgba(23,32,28,.08)}
  .hero-img{aspect-ratio:1/1;border-radius:24px;background:repeating-linear-gradient(45deg,#eef2f0,#eef2f0 12px,#e3ebe6 12px,#e3ebe6 24px);display:flex;align-items:flex-end;padding:20px}
  .img-tag{font:500 12px ui-monospace,Menlo,monospace;color:#8a9790;background:#fff;padding:5px 10px;border-radius:8px}

  .section-title{font-size:34px;font-weight:600;letter-spacing:-.02em;margin:0 0 8px;text-align:center}
  .section-kicker{text-align:center;color:#8a9790;font-size:15px;margin:0 0 40px}

  .pains{padding:24px 60px 72px}
  .pains-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .pain-card{background:#fff;border-radius:20px;padding:32px 28px;box-shadow:0 2px 14px rgba(23,32,28,.06)}
  .pain-num{width:44px;height:44px;border-radius:999px;background:#e9f1ec;color:#1a4d3a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;margin-bottom:20px}
  .pain-card h3{font-size:20px;font-weight:600;margin:0 0 12px;letter-spacing:-.01em}
  .pain-card p{font-size:15px;line-height:1.7;color:#5b6b63;margin:0}

  .about{padding:0 60px 72px}
  .about-inner{background:#1a4d3a;border-radius:28px;padding:52px 56px;display:grid;grid-template-columns:.7fr 1.3fr;gap:48px;align-items:center;color:#fff}
  .about-img{aspect-ratio:1/1;border-radius:20px;background:repeating-linear-gradient(45deg,#245e48,#245e48 12px,#2e6d54 12px,#2e6d54 24px);display:flex;align-items:flex-end;padding:18px}
  .about-img .img-tag{color:#1a4d3a}
  .about-kicker{font-size:13px;font-weight:600;color:#8fc4ad;margin-bottom:12px}
  .about h2{font-size:30px;font-weight:600;letter-spacing:-.02em;margin:0 0 18px;color:#fff}
  .about-body{font-size:16.5px;line-height:1.75;color:#cfe0d8;margin:0 0 24px}
  .about-bullets{display:flex;flex-wrap:wrap;gap:10px}
  .bullet{font-size:14px;font-weight:500;background:#fff;color:#1a4d3a;padding:9px 16px;border-radius:999px}

  .services{padding:0 60px 72px}
  .tiers{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:820px;margin:0 auto}
  .tier{border-radius:24px;padding:36px 34px;box-shadow:0 2px 16px rgba(23,32,28,.07)}
  .tier h3{font-size:19px;font-weight:600;margin:0 0 6px}
  .tier-desc{font-size:14.5px;opacity:.8;margin:0 0 22px}
  .tier-price{display:flex;align-items:baseline;gap:6px;margin-bottom:24px}
  .tier-price .amt{font-size:40px;font-weight:600;letter-spacing:-.02em}
  .tier-price .unit{font-size:14px;opacity:.75}
  .tier-items{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
  .tier-item{display:flex;gap:10px;font-size:14.5px;line-height:1.5;opacity:.92}
  .tier-item b{font-weight:700}
  .tier-cta{display:block;text-align:center;text-decoration:none;font-size:14.5px;font-weight:600;padding:13px;border-radius:999px}

  .faq{padding:0 60px 72px;max-width:800px;margin:0 auto}
  .faq h2{font-size:28px;font-weight:600;letter-spacing:-.02em;margin:0 0 28px;text-align:center}
  .faq-list{display:flex;flex-direction:column;gap:14px}
  .faq-item{background:#fff;border-radius:16px;padding:24px 26px}
  .faq-item h3{font-size:16.5px;font-weight:600;margin:0 0 9px}
  .faq-item p{font-size:15px;line-height:1.7;color:#5b6b63;margin:0}

  .booking{padding:0 60px 64px}
  .book-inner{background:#12362a;border-radius:28px;color:#fff;padding:56px;display:grid;grid-template-columns:1.3fr .7fr;gap:48px;align-items:center}
  .book-kicker{font-size:13px;font-weight:600;color:#8fc4ad;margin-bottom:14px}
  .book-inner h2{font-size:34px;font-weight:600;letter-spacing:-.025em;margin:0 0 14px;color:#fff}
  .book-sub{font-size:16.5px;line-height:1.7;color:#cfe0d8;margin:0 0 28px}
  .book-cta{text-decoration:none;font-size:15px;font-weight:600;color:#12362a;background:#fff;padding:14px 28px;border-radius:999px;display:inline-block}
  .book-qr{display:flex;flex-direction:column;align-items:center;gap:12px}
  .qr-box{width:148px;height:148px;border-radius:18px;background:repeating-linear-gradient(45deg,#1c4a3a,#1c4a3a 9px,#245640 9px,#245640 18px);display:flex;align-items:center;justify-content:center}
  .qr-box span{font:500 11px ui-monospace,Menlo,monospace;color:#9fd0ba;text-align:center;white-space:pre-line}
  .book-wechat{font-size:13.5px;color:#cfe0d8}

  .footer{padding:24px 60px 48px;font-size:12.5px;color:#a89f92;text-align:center}

  @media (max-width:860px){
    .nav,.hero,.pains,.about,.services,.faq,.booking,.footer{padding-left:24px;padding-right:24px}
    .hero{grid-template-columns:1fr}
    .hero h1{font-size:38px;white-space:normal}
    .hero-img{max-width:360px}
    .pains-grid{grid-template-columns:1fr}
    .about-inner{grid-template-columns:1fr;padding:36px 28px}
    .about-img{max-width:260px}
    .tiers{grid-template-columns:1fr}
    .book-inner{grid-template-columns:1fr;padding:36px 28px;text-align:center}
    .book-qr{margin:0 auto}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const CALENDLY = "https://calendly.com/your-handle";

const ZH = {
  brand: '[您的名字] 理财顾问',
  navHome: '首页',
  navResources: '资源',
  heroKicker: '湾区华人工程师 · 财务规划',
  heroTitle: '钱的事，慢慢聊清楚',
  heroSub: '专注服务 30–45 岁湾区科技从业者。中立、透明、不销售任何产品——只帮你把复杂的钱，理出清晰的方向。',
  cta1: '预约免费咨询',
  cta2: '了解服务',
  painsKicker: '你面对的问题',
  painsTitle: '你是不是也卡在这些地方？',
  pains: [
    { k: '01', title: 'RSU vest 了，然后呢？', body: '该不该马上卖、如何避免集中持仓风险、vesting 和卖出各自怎么交税——我帮你定一套清晰的规则，而不是凭感觉操作。' },
    { k: '02', title: '退休账户，配置对了吗？', body: '401K 选 Traditional 还是 Roth、Mega Backdoor Roth 值不值得做、雇主 match 有没有拿满——把每一块税优空间用到位。' },
    { k: '03', title: '节税机会，别白白溜走。', body: 'ISO 行权时点与 AMT、RSU 补税规划、529 教育金、全年现金流——一份贯穿全年的规划，而不是报税季才想起。' },
  ],
  aboutKicker: '关于我',
  aboutTitle: '工程师出身，懂你的处境。',
  aboutBody: '我曾在湾区科技公司工作多年，亲身经历过 RSU、期权和跳槽带来的财务困惑。后来成为持证理财顾问（CFP®），专注帮助华人工程师家庭。我采用 fee-only、fiduciary 模式——收入只来自你付的咨询费，不靠卖产品抽佣，立场和你完全一致。',
  aboutBullets: ['CFP® 持证理财顾问', 'Fee-only · 受托责任', '中英文均可沟通'],
  servicesKicker: '服务与定价',
  servicesTitle: '两种合作方式，按需选择。',
  tiers: [
    { name: '单次深度咨询', desc: '适合有具体问题、想快速厘清方向。', price: '$[XXX]', unit: '/ 90 分钟', cta: '预约单次咨询', items: ['一对一深入梳理你的具体问题', 'RSU / 401K / 税务任一主题', '会后书面行动清单', '两周内邮件跟进答疑'],
      warmBg: '#fff', warmText: '#17201c', warmCtaColor: '#1a4d3a', warmCtaBg: '#e9f1ec' },
    { name: '年度财务顾问', desc: '持续陪伴，全年把关。', price: '$[X,XXX]', unit: '/ 年', cta: '预约了解年度方案', items: ['全面财务规划与年度目标', '季度复盘 + 组合调整', '税务季专项支持', '全年随时答疑'],
      warmBg: '#12362a', warmText: '#fff', warmCtaColor: '#12362a', warmCtaBg: '#fff' },
  ],
  faqTitle: '常见问题',
  faqs: [
    { q: '你会向我推销保险或理财产品吗？', a: '不会。我是 fee-only 顾问，收入只来自咨询费，不从任何产品中抽取佣金，也没有销售指标。' },
    { q: '我资产还不多，值得找顾问吗？', a: '越早规划，复利和税务优化的空间越大。RSU 刚开始 vest、正在换工作、或第一次面对大额税单，都是很好的起点。' },
    { q: '咨询用中文还是英文？', a: '都可以。中文、英文或中英夹杂都没问题，用你最自在的方式沟通。' },
    { q: '我的财务信息安全吗？', a: '所有信息严格保密，仅用于为你提供建议，不会与任何第三方分享。' },
  ],
  bookKicker: '开始',
  bookTitle: '先聊 30 分钟，看看是否合适。',
  bookSub: '初次咨询免费，没有任何推销。带上你的问题就好。',
  bookCalendly: '用 Calendly 预约',
  bookWechat: '或扫码加微信',
  wechatNote: '微信二维码\n（放你的图）',
  footer: '© 2026 [您的名字] 理财顾问 · 仅供教育用途，不构成个性化投资建议。',
};

const EN = {
  brand: '[Your Name] Financial Planning',
  navHome: 'Home',
  navResources: 'Resources',
  heroKicker: 'For Bay Area engineers · Financial planning',
  heroTitle: 'Your money, made clear.',
  heroSub: 'Financial planning built for tech professionals aged 30–45 in the Bay Area. Independent, transparent, and product-free — I turn a complicated financial life into a clear plan.',
  cta1: 'Book a free call',
  cta2: 'See services',
  painsKicker: 'What you face',
  painsTitle: 'Sound familiar?',
  pains: [
    { k: '01', title: 'Your RSUs vested. Now what?', body: 'When to sell, how to avoid over-concentration, and how vesting and sales are each taxed — we set clear rules instead of going on gut feel.' },
    { k: '02', title: 'Is your retirement setup right?', body: 'Traditional vs. Roth 401(k), whether a Mega Backdoor Roth is worth it, and maxing your employer match — put every tax-advantaged dollar to work.' },
    { k: '03', title: "Don't leave tax savings behind.", body: 'ISO exercise timing and AMT, RSU withholding gaps, 529 college savings, and full-year cash flow — planning that runs all year, not just in April.' },
  ],
  aboutKicker: 'About',
  aboutTitle: 'An engineer who gets it.',
  aboutBody: "I spent years at Bay Area tech companies and lived through the confusion of RSUs, options, and job changes firsthand. I became a CFP® professional focused on Chinese engineering families. I work fee-only and as a fiduciary — I'm paid only by you, never by selling products, so we're always on the same side.",
  aboutBullets: ['CFP® certified planner', 'Fee-only · Fiduciary', 'Fluent in Chinese & English'],
  servicesKicker: 'Services & pricing',
  servicesTitle: 'Two ways to work together.',
  tiers: [
    { name: 'One-time deep dive', desc: 'Best when you have a specific question.', price: '$[XXX]', unit: '/ 90 min', cta: 'Book a session', items: ['One-on-one deep dive on your situation', 'Focus on RSU, 401(k), or taxes', 'Written action list afterward', 'Two weeks of email follow-up'],
      warmBg: '#fff', warmText: '#17201c', warmCtaColor: '#1a4d3a', warmCtaBg: '#e9f1ec' },
    { name: 'Annual advisor', desc: 'Ongoing guidance, all year long.', price: '$[X,XXX]', unit: '/ year', cta: 'Ask about annual', items: ['Comprehensive plan & annual goals', 'Quarterly reviews + rebalancing', 'Dedicated tax-season support', 'Questions answered year-round'],
      warmBg: '#12362a', warmText: '#fff', warmCtaColor: '#12362a', warmCtaBg: '#fff' },
  ],
  faqTitle: 'FAQ',
  faqs: [
    { q: 'Will you sell me insurance or products?', a: "No. I'm a fee-only advisor paid solely through advisory fees — no commissions, no sales quotas." },
    { q: "My assets aren't large yet. Worth it?", a: 'The earlier you plan, the more compounding and tax optimization can do. Newly vesting RSUs, a job change, or a first big tax bill are great starting points.' },
    { q: 'Chinese or English?', a: 'Either. Chinese, English, or a mix — whatever feels most natural to you.' },
    { q: 'Is my financial information safe?', a: 'Everything is kept strictly confidential and used only to advise you — never shared with third parties.' },
  ],
  bookKicker: 'Get started',
  bookTitle: 'Start with a 30-minute chat.',
  bookSub: 'The intro call is free, with zero sales pressure. Just bring your questions.',
  bookCalendly: 'Book via Calendly',
  bookWechat: 'Or scan to add on WeChat',
  wechatNote: 'WeChat QR\n(your image)',
  footer: '© 2026 [Your Name] Financial Planning · For education only; not personalized investment advice.',
};

let lang = 'zh';

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(){
  const t = lang === 'zh' ? ZH : EN;
  const toggleLabel = lang === 'zh' ? 'EN' : '中文';
  document.documentElement.lang = lang;

  const painsHtml = t.pains.map(p => `
    <div class="pain-card">
      <div class="pain-num">${esc(p.k)}</div>
      <h3>${esc(p.title)}</h3>
      <p>${esc(p.body)}</p>
    </div>`).join('');

  const bulletsHtml = t.aboutBullets.map(b => `<span class="bullet">${esc(b)}</span>`).join('');

  const tiersHtml = t.tiers.map(tier => `
    <div class="tier" style="background:${tier.warmBg};color:${tier.warmText}">
      <h3>${esc(tier.name)}</h3>
      <p class="tier-desc">${esc(tier.desc)}</p>
      <div class="tier-price"><span class="amt">${esc(tier.price)}</span><span class="unit">${esc(tier.unit)}</span></div>
      <div class="tier-items">
        ${tier.items.map(li => `<div class="tier-item"><b>·</b>${esc(li)}</div>`).join('')}
      </div>
      <a href="${CALENDLY}" class="tier-cta" style="color:${tier.warmCtaColor};background:${tier.warmCtaBg}">${esc(tier.cta)}</a>
    </div>`).join('');

  const faqsHtml = t.faqs.map(f => `
    <div class="faq-item">
      <h3>${esc(f.q)}</h3>
      <p>${esc(f.a)}</p>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="nav">
      <div class="brand">🌿 ${esc(t.brand)}</div>
      <div class="nav-right">
        <div class="nav-links">
          <a href="index.html" class="nav-link active">${esc(t.navHome)}</a>
          <a href="resources.html" class="nav-link">${esc(t.navResources)}</a>
        </div>
        <button class="toggle" id="langToggle">${esc(toggleLabel)}</button>
        <a href="${CALENDLY}" class="btn-primary">${esc(t.cta1)}</a>
      </div>
    </div>

    <div class="hero">
      <div>
        <div class="kicker">${esc(t.heroKicker)}</div>
        <h1>${esc(t.heroTitle)}</h1>
        <p>${esc(t.heroSub)}</p>
        <div class="hero-cta">
          <a href="${CALENDLY}" class="btn-lg-primary">${esc(t.cta1)}</a>
          <a href="${CALENDLY}" class="btn-lg-ghost">${esc(t.cta2)}</a>
        </div>
      </div>
      <div class="hero-img"><span class="img-tag">portrait / 顾问照片</span></div>
    </div>

    <div class="pains">
      <h2 class="section-title">${esc(t.painsTitle)}</h2>
      <p class="section-kicker">${esc(t.painsKicker)}</p>
      <div class="pains-grid">${painsHtml}</div>
    </div>

    <div class="about">
      <div class="about-inner">
        <div class="about-img"><span class="img-tag">headshot</span></div>
        <div>
          <div class="about-kicker">${esc(t.aboutKicker)}</div>
          <h2>${esc(t.aboutTitle)}</h2>
          <p class="about-body">${esc(t.aboutBody)}</p>
          <div class="about-bullets">${bulletsHtml}</div>
        </div>
      </div>
    </div>

    <div class="services">
      <h2 class="section-title">${esc(t.servicesTitle)}</h2>
      <p class="section-kicker">${esc(t.servicesKicker)}</p>
      <div class="tiers">${tiersHtml}</div>
    </div>

    <div class="faq">
      <h2>${esc(t.faqTitle)}</h2>
      <div class="faq-list">${faqsHtml}</div>
    </div>

    <div class="booking">
      <div class="book-inner">
        <div>
          <div class="book-kicker">${esc(t.bookKicker)}</div>
          <h2>${esc(t.bookTitle)}</h2>
          <p class="book-sub">${esc(t.bookSub)}</p>
          <a href="${CALENDLY}" class="book-cta">${esc(t.bookCalendly)}</a>
        </div>
        <div class="book-qr">
          <div class="qr-box"><span>${esc(t.wechatNote)}</span></div>
          <span class="book-wechat">${esc(t.bookWechat)}</span>
        </div>
      </div>
    </div>

    <div class="footer">${esc(t.footer)}</div>
  `;

  document.getElementById('langToggle').addEventListener('click', () => {
    lang = lang === 'zh' ? 'en' : 'zh';
    render();
  });
}

render();
</script>
</body>
</html>
