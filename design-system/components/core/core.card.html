<!-- @dsCard group="Components" viewport="700x260" name="Core — Button · Badge · SectionHeading" subtitle="Actions, pills, and section headers" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--bg);padding:28px;color:var(--body)}
  .grid{display:flex;flex-direction:column;gap:24px}
  .r{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .lbl{font:var(--weight-medium) 11px var(--font-mono);color:var(--muted);width:96px;flex:none}
  .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-body);font-weight:var(--weight-medium);border-radius:var(--radius);border:1px solid transparent;padding:16px 28px;font-size:var(--text-body);line-height:1;text-decoration:none;box-sizing:border-box}
  .primary{background:var(--accent);color:var(--on-accent)}
  .secondary{background:transparent;color:var(--accent);border-color:var(--accent-border)}
  .pill{display:inline-flex;align-items:center;padding:6px 12px;border-radius:var(--radius-pill);font-size:var(--text-eyebrow);font-weight:var(--weight-medium);line-height:1.2}
  .tint{background:var(--accent-tint);color:var(--accent)}
  .mono{background:var(--accent-tint);color:var(--accent);font-family:var(--font-mono)}
  .onacc{background:var(--accent);color:var(--on-accent);padding:16px 22px;border-radius:var(--radius-xl)}
  .onacc .pill{background:rgba(255,255,255,.16);color:#fff;letter-spacing:.12em}
</style></head>
<body><div class="grid">
  <div class="r"><span class="lbl">Button</span>
    <a class="btn primary">预约 15 分钟免费聊聊</a>
    <a class="btn secondary">加微信咨询</a>
  </div>
  <div class="r"><span class="lbl">Badge</span>
    <span class="pill tint">RSU 已开始 vest？该做规划了</span>
    <span class="pill mono">CFP® · 占位</span>
    <span class="onacc"><span class="pill">最受欢迎</span></span>
  </div>
  <div class="r"><span class="lbl">Heading</span>
    <div style="text-align:left">
      <div style="font-size:var(--text-eyebrow);letter-spacing:var(--track-eyebrow);color:var(--muted);font-weight:500;margin-bottom:12px">服务与价格</div>
      <h2 style="margin:0;font-family:var(--font-display);font-weight:600;font-size:var(--text-h2);color:var(--ink)">简单两档，明码标价</h2>
    </div>
  </div>
</div></body></html>
