<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4 / 8px grid" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg);padding:24px}
.row{display:flex;align-items:flex-end;gap:16px}
.col{text-align:center}
.bar{background:var(--accent);border-radius:3px;width:34px}
.n{display:block;margin-top:8px;font:var(--weight-medium) 11px var(--font-mono);color:var(--muted)}</style></head>
<body><div class="row">
<div class="col"><div class="bar" style="height:4px"></div><span class="n">4</span></div>
<div class="col"><div class="bar" style="height:8px"></div><span class="n">8</span></div>
<div class="col"><div class="bar" style="height:12px"></div><span class="n">12</span></div>
<div class="col"><div class="bar" style="height:16px"></div><span class="n">16</span></div>
<div class="col"><div class="bar" style="height:24px"></div><span class="n">24</span></div>
<div class="col"><div class="bar" style="height:32px"></div><span class="n">32</span></div>
<div class="col"><div class="bar" style="height:40px"></div><span class="n">40</span></div>
<div class="col"><div class="bar" style="height:56px"></div><span class="n">56</span></div>
<div class="col"><div class="bar" style="height:72px"></div><span class="n">72</span></div>
</div></body></html>
