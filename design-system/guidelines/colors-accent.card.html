<!-- @dsCard group="Colors" viewport="700x150" name="Accent · 深蓝 (default)" subtitle="Primary hue in three depths + tint" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg)}
.row{display:flex;gap:12px;padding:20px}
.sw{flex:1;height:96px;border-radius:var(--radius-lg);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;border:1px solid var(--line)}
.n{font:var(--weight-medium) 12px var(--font-mono)}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--accent)"><span class="n" style="color:#fff">--accent<br>#274a6d</span></div>
<div class="sw" style="background:var(--accent-strong)"><span class="n" style="color:#fff">--accent-strong<br>#1f3d59</span></div>
<div class="sw" style="background:var(--accent-deep)"><span class="n" style="color:#fff">--accent-deep<br>#162c40</span></div>
<div class="sw" style="background:var(--accent-tint)"><span class="n" style="color:var(--accent)">--accent-tint<br>#eef2f7</span></div>
</div></body></html>
