<!-- @dsCard group="Brand" viewport="700x180" name="Radii & shadows" subtitle="Corner + elevation system" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg);padding:24px}
.row{display:flex;gap:22px;align-items:center}
.box{width:120px;height:96px;background:var(--surface);border:1px solid var(--line);display:flex;align-items:flex-end;padding:10px;box-sizing:border-box}
.n{font:var(--weight-medium) 11px var(--font-mono);color:var(--muted)}</style></head>
<body><div class="row">
<div class="box" style="border-radius:var(--radius);box-shadow:var(--shadow-card)"><span class="n">radius 9<br>shadow-card</span></div>
<div class="box" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-raise)"><span class="n">radius 14<br>shadow-raise</span></div>
<div class="box" style="border-radius:var(--radius-xl);box-shadow:var(--shadow-photo)"><span class="n">radius 16<br>shadow-photo</span></div>
<div class="box" style="border-radius:var(--radius-xl);background:var(--accent);box-shadow:var(--shadow-pop)"><span class="n" style="color:var(--on-accent-muted)">shadow-pop</span></div>
</div></body></html>
