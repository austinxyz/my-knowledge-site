<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Warm-toned canvas, ink, body, muted, line" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg)}
.row{display:flex;gap:12px;padding:20px}
.sw{flex:1;height:96px;border-radius:var(--radius-lg);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;border:1px solid var(--line)}
.n{font:var(--weight-medium) 12px var(--font-mono)}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--page)"><span class="n" style="color:var(--ink)">--page<br>#eceae4</span></div>
<div class="sw" style="background:var(--bg)"><span class="n" style="color:var(--ink)">--bg<br>#fbfbf9</span></div>
<div class="sw" style="background:var(--ink)"><span class="n" style="color:#fff">--ink<br>#1c2420</span></div>
<div class="sw" style="background:var(--body)"><span class="n" style="color:#fff">--body<br>#4b5650</span></div>
<div class="sw" style="background:var(--muted)"><span class="n" style="color:#fff">--muted<br>#78827b</span></div>
</div></body></html>
