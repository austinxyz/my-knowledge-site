<!-- @dsCard group="Colors" viewport="700x150" name="Accent schemes" subtitle="data-theme switches the whole page" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg)}
.row{display:flex;gap:12px;padding:20px}
.col{flex:1;text-align:center}
.sw{height:70px;border-radius:var(--radius);background:var(--accent);border:1px solid var(--line)}
.n{display:block;margin-top:8px;font:var(--weight-medium) 12px var(--font-body);color:var(--body)}</style></head>
<body><div class="row">
<div class="col"><div class="sw"></div><span class="n">深蓝 default</span></div>
<div class="col" data-theme="green"><div class="sw"></div><span class="n">green</span></div>
<div class="col" data-theme="teal"><div class="sw"></div><span class="n">teal</span></div>
<div class="col" data-theme="slate"><div class="sw"></div><span class="n">slate</span></div>
<div class="col" data-theme="bronze"><div class="sw"></div><span class="n">bronze</span></div>
</div></body></html>
