<!-- @dsCard group="Type" viewport="700x220" name="Display · Noto Serif SC" subtitle="Headlines — warmth + authority" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg);color:var(--ink);padding:24px}
.spec{display:flex;flex-direction:column;gap:14px}
.line{display:flex;align-items:baseline;gap:16px}
.tag{font:var(--weight-medium) 11px var(--font-mono);color:var(--muted);width:120px;flex:none}
.d{font-family:var(--font-display);font-weight:var(--weight-semibold);line-height:1.2}</style></head>
<body><div class="spec">
<div class="line"><span class="tag">hero · 44 / 600</span><span class="d" style="font-size:var(--text-hero)">交给懂你的人</span></div>
<div class="line"><span class="tag">h2 · 30 / 600</span><span class="d" style="font-size:var(--text-h2)">简单两档，明码标价</span></div>
<div class="line"><span class="tag">h3 · 19 / 600</span><span class="d" style="font-size:var(--text-h3)">退休规划全景图</span></div>
</div></body></html>
