<!-- @dsCard group="Type" viewport="700x220" name="Body · Noto Sans SC" subtitle="Lead, body, small, eyebrow, mono" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg);color:var(--body);padding:24px}
.spec{display:flex;flex-direction:column;gap:12px}
.line{display:flex;align-items:baseline;gap:16px}
.tag{font:var(--weight-medium) 11px var(--font-mono);color:var(--muted);width:120px;flex:none}</style></head>
<body><div class="spec">
<div class="line"><span class="tag">lead · 17</span><span style="font-size:var(--text-lead)">用你听得懂的话，只给建议，不做推销。</span></div>
<div class="line"><span class="tag">body · 15</span><span style="font-size:var(--text-body)">帮你把每一块免税额度用满、用对。</span></div>
<div class="line"><span class="tag">small · 13</span><span style="font-size:var(--text-small)">一次 90 分钟 · 一对一</span></div>
<div class="line"><span class="tag">eyebrow · 12</span><span style="font-size:var(--text-eyebrow);letter-spacing:var(--track-eyebrow);text-transform:uppercase;color:var(--muted);font-weight:500">关于我 / ABOUT</span></div>
<div class="line"><span class="tag">mono · 13</span><span style="font-family:var(--font-mono);font-size:var(--text-small);color:var(--accent)">CFP® · 占位</span></div>
</div></body></html>
